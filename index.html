<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta http-equiv="refresh" content="0; url=app.html">
  <title>CTI English — Redirection…</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:system-ui,sans-serif;
      background:linear-gradient(135deg,#1a3a6a,#1a6a4a);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      color:#fff;text-align:center;padding:24px;
    }
    .wrap{max-width:340px}
    .icon{font-size:3.5rem;margin-bottom:16px;display:block}
    h1{font-size:1.4rem;font-weight:800;margin-bottom:8px}
    p{font-size:.9rem;opacity:.85;margin-bottom:24px;line-height:1.5}
    a{
      display:inline-block;padding:14px 32px;
      background:#fff;color:#1a3a6a;
      border-radius:30px;font-weight:700;font-size:1rem;
      text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.25);
    }
    .sub{margin-top:16px;font-size:.78rem;opacity:.65}
    .sub a{background:none;color:#fff;box-shadow:none;padding:4px 8px;font-weight:500;font-size:.78rem}
  </style>
</head>
<body>
  <div class="wrap">
    <span class="icon">📘</span>
    <h1>CTI English PWA</h1>
    <p>Révision adaptative d'anglais<br>pour les apprenants CTI — Dakar</p>
    <a href="app.html">Ouvrir l'application →</a>
    <div class="sub">
      Ancienne version :
      <a href="revision.html">révision classique</a> &nbsp;|&nbsp;
      <a href="espagnol.html">espagnol</a>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    window.location.replace('app.html');
  </script>
</body>
</html>
