<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI — Cahier de Révision Anglais Complet</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f6;
  --bg2: #f0ede6;
  --bg3: #e8e4db;
  --text: #1c1a14;
  --text2: #6b6860;
  --text3: #9a9890;
  --border: rgba(0,0,0,0.10);
  --border2: rgba(0,0,0,0.18);
  --accent: #1a4a8a;
  --accent2: #d4a840;
  --green-bg: #e8f5d8; --green-bd: #4a8a1a; --green-tx: #2d5a0e;
  --red-bg: #fdeaea; --red-bd: #8a1a1a; --red-tx: #5a0e0e;
  --blue-bg: #e0ecfa; --blue-tx: #1a4a8a;
  --gold: #d4a840;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16140f; --bg2: #201e17; --bg3: #2a2720;
    --text: #f0ece2; --text2: #a8a49a; --text3: #706e66;
    --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.18);
    --accent: #4a7ac8; --accent2: #e0b84a;
    --green-bg: #0e2a04; --green-bd: #2d5a0e; --green-tx: #a8d878;
    --red-bg: #2a0808; --red-bd: #5a0e0e; --red-tx: #e88888;
    --blue-bg: #081830; --blue-tx: #6898d8;
    --gold: #e0b84a;
  }
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
.app { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

/* HEADER */
.header {
  text-align: center; margin-bottom: 1.5rem;
  padding: 2rem 1.5rem 1.5rem;
  background: var(--accent);
  border-radius: var(--radius);
  color: #fff;
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.header::after {
  content: ''; position: absolute; bottom: -30px; left: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.header .logo {
  display: inline-block; background: var(--gold); color: #1c1a14;
  font-size: 10px; font-weight: 700; padding: 4px 12px;
  border-radius: 4px; letter-spacing: 0.1em; margin-bottom: 1rem;
  text-transform: uppercase;
}
.header h1 { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; margin-bottom: 6px; color: #fff; }
.header p { font-size: 13px; opacity: 0.75; }

/* SCORE */
.score-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--bg);
  border-radius: var(--radius); border: 1px solid var(--border);
  margin-bottom: 1.25rem;
}
.score-label { font-size: 12px; color: var(--text2); white-space: nowrap; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.score-val { font-size: 18px; font-weight: 600; white-space: nowrap; min-width: 64px; color: var(--accent); }
.score-track { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; background: var(--green-bd); border-radius: 3px; transition: width 0.5s ease; width: 0%; }
.score-pct { font-size: 13px; color: var(--text2); white-space: nowrap; min-width: 40px; text-align: right; font-weight: 500; }

/* TABS SCROLL */
.tabs-wrap { overflow-x: auto; margin-bottom: 1.25rem; padding-bottom: 4px; }
.tabs-wrap::-webkit-scrollbar { height: 4px; }
.tabs-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.tabs { display: flex; gap: 6px; min-width: max-content; }
.tab {
  padding: 7px 16px; border-radius: 20px;
  border: 1px solid var(--border2); font-size: 12px;
  cursor: pointer; background: transparent; color: var(--text2);
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  font-weight: 500; white-space: nowrap;
}
.tab:hover { background: var(--bg2); color: var(--text); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* SECTION */
.section { display: none; }
.section.active { display: block; }

/* CARD */
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.4rem;
  margin-bottom: 1rem;
}
.card-tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  letter-spacing: 0.08em; color: var(--text3);
  text-transform: uppercase; margin-bottom: 0.7rem;
}
.question { font-size: 15px; color: var(--text); margin-bottom: 1rem; line-height: 1.6; }
.question em { font-style: italic; color: var(--text2); }
.question strong { color: var(--accent); }

/* PROGRESS DOTS */
.dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 1rem; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; transition: background 0.2s; }
.dot.ok { background: var(--green-bd); }
.dot.ko { background: var(--red-bd); }
.dot.cur { background: var(--accent); }

/* QCM OPTIONS */
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 11px 16px; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); cursor: pointer;
  font-size: 14px; color: var(--text); background: transparent;
  text-align: left; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif; line-height: 1.45;
}
.option:hover:not(.locked) { background: var(--bg2); border-color: var(--accent); }
.option.correct { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); }
.option.wrong { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
.option.reveal { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); }

/* FEEDBACK */
.fb {
  margin-top: 0.8rem; padding: 10px 14px;
  border-radius: var(--radius-sm); font-size: 13px;
  display: none; line-height: 1.55;
}
.fb.ok { background: var(--green-bg); color: var(--green-tx); display: block; border-left: 3px solid var(--green-bd); }
.fb.ko { background: var(--red-bg); color: var(--red-tx); display: block; border-left: 3px solid var(--red-bd); }

/* BUTTONS */
.btn {
  padding: 9px 20px; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 13px;
  cursor: pointer; background: transparent; color: var(--text);
  font-family: 'DM Sans', sans-serif; transition: all 0.15s; font-weight: 500;
}
.btn:hover { background: var(--bg2); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.88; background: var(--accent); }
.nav { display: flex; justify-content: flex-end; margin-top: 1rem; gap: 8px; }

/* INPUTS */
.fill-in {
  width: 100%; padding: 10px 14px;
  border: 1px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  color: var(--text); background: var(--bg2);
  margin-bottom: 8px; outline: none;
  transition: border-color 0.15s;
}
.fill-in:focus { border-color: var(--accent); }
.hint {
  font-size: 12px; color: var(--text3); margin-bottom: 10px;
  padding: 6px 10px; background: var(--bg2);
  border-radius: var(--radius-sm); display: inline-block;
}

/* MATCH */
.match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.m-item {
  padding: 11px 12px; border: 1px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 13px;
  cursor: pointer; text-align: center; color: var(--text);
  background: transparent; font-family: 'DM Sans', sans-serif;
  line-height: 1.4; transition: all 0.15s;
}
.m-item:hover { background: var(--bg2); border-color: var(--accent); }
.m-item.sel { background: var(--blue-bg); border-color: var(--accent); }
.m-item.m-ok { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); pointer-events: none; }
.m-item.m-ko { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
.match-sep { height: 12px; }

/* DIALOGUE */
.bank { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 1rem; }
.chip {
  padding: 6px 14px; border: 1px solid var(--border2);
  border-radius: 20px; font-size: 13px; cursor: pointer;
  color: var(--text); background: transparent;
  font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.chip:hover:not(.used) { background: var(--bg2); border-color: var(--accent); }
.chip.sel-chip { border-color: var(--accent); background: var(--blue-bg); color: var(--blue-tx); }
.chip.used { opacity: 0.28; pointer-events: none; }
.diag-line { margin: 8px 0; font-size: 14px; line-height: 1.65; }
.diag-line strong { color: var(--accent); font-weight: 600; }
.blank {
  display: inline-block; min-width: 90px; border-bottom: 2px solid var(--border2);
  margin: 0 4px; text-align: center; cursor: pointer;
  padding: 0 6px; color: var(--text); font-size: 14px;
  transition: border-color 0.15s;
}
.blank:hover { border-bottom-color: var(--accent); }
.blank.b-ok { border-bottom-color: var(--green-bd); color: var(--green-tx); }
.blank.b-ko { border-bottom-color: var(--red-bd); color: var(--red-tx); }

/* TEXTAREA */
textarea.fill-in { resize: vertical; min-height: 68px; }

/* CONGRATS */
.congrats { text-align: center; padding: 2.5rem 1rem; }
.congrats .emoji { font-size: 40px; margin-bottom: 0.6rem; }
.congrats h2 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; margin-bottom: 0.5rem; }
.congrats p { color: var(--text2); font-size: 14px; margin-bottom: 1.5rem; }

/* GRID for time/numbers */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ref-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 14px;
  font-size: 13px; line-height: 1.7;
}
.ref-box h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px; }

/* SECTION INTRO */
.sec-intro {
  background: var(--blue-bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  font-size: 13px; color: var(--blue-tx); margin-bottom: 1rem;
  line-height: 1.55;
}

@media (max-width: 520px) {
  .match-cols { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
  .header h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">Community Training International</div>
    <h1>Cahier de Révision — English</h1>
    <p>QCM · Lacunes · Association · Conjugaison · Dates · Nombres · Temps · Dialogue · Traduction · Vocabulaire</p>
  </div>

  <div class="score-bar">
    <span class="score-label">Score</span>
    <span class="score-val" id="sv">0 / 0</span>
    <div class="score-track"><div class="score-fill" id="sf"></div></div>
    <span class="score-pct" id="sp">—</span>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab active" onclick="showSec('qcm',this)">QCM</button>
      <button class="tab" onclick="showSec('conj',this)">Conjugaison</button>
      <button class="tab" onclick="showSec('lac',this)">Lacunes</button>
      <button class="tab" onclick="showSec('asso',this)">Association</button>
      <button class="tab" onclick="showSec('dates',this)">Dates & Temps</button>
      <button class="tab" onclick="showSec('nombres',this)">Nombres</button>
      <button class="tab" onclick="showSec('trad',this)">Traduction</button>
      <button class="tab" onclick="showSec('diag',this)">Dialogue</button>
      <button class="tab" onclick="showSec('voc',this)">Vocabulaire</button>
      <button class="tab" onclick="showSec('modal',this)">Modaux</button>
    </div>
  </div>

  <div id="sec-qcm" class="section active"></div>
  <div id="sec-conj" class="section"></div>
  <div id="sec-lac" class="section"></div>
  <div id="sec-asso" class="section"></div>
  <div id="sec-dates" class="section"></div>
  <div id="sec-nombres" class="section"></div>
  <div id="sec-trad" class="section"></div>
  <div id="sec-diag" class="section"></div>
  <div id="sec-voc" class="section"></div>
  <div id="sec-modal" class="section"></div>
</div>

<script>
'use strict';
let totOk=0, totAns=0;
function score(ok){
  totAns++; if(ok) totOk++;
  document.getElementById('sv').textContent=totOk+' / '+totAns;
  const p=totAns?Math.round(totOk/totAns*100):0;
  document.getElementById('sf').style.width=p+'%';
  document.getElementById('sp').textContent=totAns?p+'%':'—';
}
function showSec(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  el.classList.add('active');
}
function dots(data,cur,results){
  return data.map((_,i)=>{
    let c='dot';
    if(i<cur) c+=results[i]?' ok':' ko';
    else if(i===cur) c+=' cur';
    return '<div class="'+c+'"></div>';
  }).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let AS={i:0,selL:null,selR:null,matched:[],res:[]};
function buildAsso(){AS={i:0,selL:null,selR:null,matched:[],res:[]};renderA();}
function renderA(){
  const el=document.getElementById('sec-asso');
  if(AS.i>=AD.length){
    el.innerHTML=`<div class="card congrats"><div class="emoji">🏆</div><h2>Association terminée !</h2><p>Tous les groupes complétés.</p><button class="btn btn-primary" onclick="buildAsso()">Recommencer</button></div>`;
    return;
  }
  const d=AD[AS.i];
  const sr=[...d.p.map(p=>p[1])].sort(()=>Math.random()-.5);
  el.innerHTML=`<div class="card">
    <div class="card-tag">${esc(d.t)} · Groupe ${AS.i+1} / ${AD.length}</div>
    <div class="question">Relie chaque expression à sa traduction.</div>
    <div class="match-cols" id="ml">${d.p.map((p,i)=>`<button class="m-item" id="ml${i}" onclick="selM('l',${i},'${p[0].replace(/'/g,"\\'")}')">${esc(p[0])}</button>`).join('')}</div>
    <div class="match-sep"></div>
    <div class="match-cols" id="mr">${sr.map((r,i)=>`<button class="m-item" id="mr${i}" onclick="selM('r',${i},'${r.replace(/'/g,"\\'")}')">${esc(r)}</button>`).join('')}</div>
    <div class="fb" id="afb"></div>
  </div>`;
  AS.matched=[];AS.selL=null;AS.selR=null;
}
function selM(side,idx,val){
  if(side==='l'){
    document.querySelectorAll('#ml .m-item').forEach(b=>b.classList.remove('sel'));
    document.getElementById('ml'+idx).classList.add('sel');
    AS.selL={idx,val};
  } else {
    document.querySelectorAll('#mr .m-item').forEach(b=>b.classList.remove('sel'));
    document.getElementById('mr'+idx).classList.add('sel');
    AS.selR={idx,val};
  }
  if(AS.selL&&AS.selR){
    const d=AD[AS.i];
    const pair=d.p.find(p=>p[0]===AS.selL.val);
    const ok=pair&&pair[1]===AS.selR.val;
    const lel=document.querySelector('#ml .sel');
    const rel=document.querySelector('#mr .sel');
    if(ok){
      if(lel)lel.classList.replace('sel','m-ok');
      if(rel)rel.classList.replace('sel','m-ok');
      AS.matched.push(AS.selL.val);
      score(true);
      if(AS.matched.length===d.p.length){setTimeout(()=>{AS.i++;renderA();},500);}
    } else {
      if(lel){lel.classList.add('m-ko');setTimeout(()=>lel.classList.remove('sel','m-ko'),500);}
      if(rel){rel.classList.add('m-ko');setTimeout(()=>rel.classList.remove('sel','m-ko'),500);}
      score(false);
    }
    AS.selL=null;AS.selR=null;
  }
}

function renderDiag(){
  const el=document.getElementById('sec-diag');
  if(DIAGS.i>=DD.length){
    el.innerHTML=`<div class="card congrats"><div class="emoji">🏆</div><h2>Dialogues terminés !</h2><p>Bravo, tous les dialogues complétés !</p><button class="btn btn-primary" onclick="buildDiag()">Recommencer</button></div>`;
    return;
  }
  const d=DD[DIAGS.i];
  const chips=d.bank.map((w,wi)=>`<button class="chip" id="ch${wi}" onclick="pickChip('${w.replace(/'/g,"\\'")}',${wi})">${esc(w)}</button>`).join('');
  const lines=d.lines.map((l,li)=>{
    if(!l.key) return `<div class="diag-line"><strong>${esc(l.sp)} :</strong> ${esc(l.txt)}</div>`;
    return `<div class="diag-line"><strong>${esc(l.sp)} :</strong> ${l.txt.replace('___',`<span class="blank" id="bl${li}" data-key="${esc(l.key)}" onclick="fillBlank(${li})">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`)}</div>`;
  }).join('');
  el.innerHTML=`<div class="card">
    <div class="card-tag">${esc(d.t)} · Dialogue ${DIAGS.i+1} / ${DD.length}</div>

    <div class="bank">${chips}</div>

    <div class="nav" id="dianav"></div>
  </div>`;
  DIAGS.sel=null;DIAGS.filled={};
}
function pickChip(word,wi){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel-chip'));
  document.getElementById('ch'+wi).classList.add('sel-chip');
  DIAGS.sel={word,wi};
}
function fillBlank(li){
  if(!DIAGS.sel) return;
  const b=document.getElementById('bl'+li);
  if(DIAGS.filled[li]){document.getElementById('ch'+DIAGS.filled[li].wi).classList.remove('used');}
  DIAGS.filled[li]=DIAGS.sel;
  b.textContent=DIAGS.sel.word;
  document.getElementById('ch'+DIAGS.sel.wi).classList.add('used');
  document.getElementById('ch'+DIAGS.sel.wi).classList.remove('sel-chip');
  DIAGS.sel=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel-chip'));
}
function checkDiag(){
  const d=DD[DIAGS.i];
  let ok=0,tot=0;
  d.lines.forEach((l,li)=>{
    if(!l.key) return;
    tot++;
    const b=document.getElementById('bl'+li);
    if(DIAGS.filled[li]&&DIAGS.filled[li].word.toLowerCase()===l.key.toLowerCase()){
      b.classList.add('b-ok');ok++;
    } else {
      b.classList.add('b-ko');b.textContent=l.key;
    }
  });
  const allOk=ok===tot;
  score(allOk);DIAGS.res[DIAGS.i]=allOk;
  const fb=document.getElementById('diafb');
  fb.textContent=allOk?'✓ Parfait !':'✗ '+ok+'/'+tot+' — Corrections en vert.';
  fb.className='fb '+(allOk?'ok':'ko');
  document.getElementById('dbtn').disabled=true;
  document.getElementById('dianav').innerHTML=`<button class="btn btn-primary" onclick="DIAGS.i++;renderDiag()">${DIAGS.i+1<DD.length?'Dialogue suivant →':'Résultat →'}</button>`;
}

  {t:'Can – Permission',q:'Comment demande-t-on poliment la permission ?',o:['I can go?','Can I go, please?','I must go?','I should go?'],a:1},
  {t:'Could',q:'"Could you help me?" exprime :',o:['une obligation','une capacité passée','une demande polie','une interdiction'],a:2},
  {t:'Could',q:'"She could run fast when she was young." Sens ?',o:['Elle doit courir vite','Elle pouvait courir vite','Elle peut courir vite','Elle devrait courir'],a:1},
  {t:'Should',q:'On utilise "should" pour :',o:['une interdiction forte','un conseil / recommandation','une obligation légale','une permission'],a:1},
  {t:'Should',q:'Phrase correcte :',o:['You should to rest.','You should resting.','You should rest.','You should rests.'],a:2},
  {t:'Must',q:'"You must wear a seatbelt." Sens ?',o:['Tu devrais porter une ceinture','Tu peux porter une ceinture','Tu dois porter une ceinture','Tu porteras une ceinture'],a:2},
  {t:'Must not',q:'"You must not smoke here." Sens ?',o:['Tu ne devrais pas fumer','Il est inutile de fumer','Tu n\'es pas obligé de fumer','Il est interdit de fumer'],a:3},
  {t:'Have to',q:'"I have to work tomorrow." Sens ?',o:['Je veux travailler','Je dois travailler','Je peux travailler','Je vais travailler'],a:1},
  {t:'Don\'t have to',q:'"You don\'t have to come." Sens ?',o:['Tu ne peux pas venir','Il est interdit de venir','Tu n\'es pas obligé de venir','Tu ne devrais pas venir'],a:2},
  {t:'May',q:'On utilise "may" pour :',o:['une obligation','une interdiction','une capacité physique','une permission / possibilité'],a:3},
  {t:'Might',q:'"It might rain." Sens ?',o:['Il pleut sûrement','Il ne pleuvra pas','Il pourrait pleuvoir','Il a plu'],a:2},
  {t:'Would',q:'"Would you like some tea?" est :',o:['une obligation','une offre polie','une interdiction','une capacité'],a:1},
  {t:'Would',q:'"I would love to come!" — "would" exprime :',o:['une certitude','un désir / souhait','une interdiction','une capacité'],a:1},
  {t:'Récap modaux',q:'Quel modal exprime une interdiction forte ?',o:['Should not','Could not','Must not','Might not'],a:2},
  {t:'Récap modaux',q:'Quel modal exprime un conseil ?',o:['Must','Can','Should','Will'],a:2},
  {t:'Récap modaux',q:'Quel modal exprime une capacité ?',o:['Must','Should','Can','Would'],a:2},
  {t:'Récap modaux',q:'"Needn\'t" est équivalent à :',o:['Must not','Don\'t have to','Shouldn\'t','Can\'t'],a:1},
];

let MS={i:0,res:[]};
function buildModal(){MS={i:0,res:[]};renderModal();}
function renderModal(){
  const el=document.getElementById('sec-modal');
  if(MS.i>=MODALD.length){
    const ok=MS.res.filter(r=>r).length;
    el.innerHTML=`<div class="card congrats"><div class="emoji">${ok>=MODALD.length*.8?'🏆':'📚'}</div><h2>${ok} / ${MODALD.length}</h2><p>${ok>=MODALD.length*.8?'Modaux maîtrisés !':'Revois les modaux !'}</p><button class="btn btn-primary" onclick="buildModal()">Recommencer</button></div>`;
    return;
  }
  const d=MODALD[MS.i];
  const ref=`<div class="sec-intro"><b>Rappel modaux :</b> can (capacité/permission) · could (passé/politesse) · should (conseil) · must (obligation) · must not (interdiction) · may/might (possibilité) · would (politesse/souhait) · have to (obligation externe) · don't have to (pas obligatoire)</div>`;
  el.innerHTML=`${ref}<div class="dots">${dots(MODALD,MS.i,MS.res)}</div>
  <div class="card">
    <div class="card-tag">${esc(d.t)} · ${MS.i+1} / ${MODALD.length}</div>
    <div class="question">${esc(d.q)}</div>
    <div class="options">${d.o.map((o,i)=>`<button class="option" onclick="ansModal(${i})">${esc(o)}</button>`).join('')}</div>
    <div class="fb" id="mfb"></div>
    <div class="nav" id="mnav"></div>
  </div>`;
}
function ansModal(i){
  const d=MODALD[MS.i];
  document.querySelectorAll('#sec-modal .option').forEach(b=>{b.onclick=null;b.classList.add('locked');});
  const opts=document.querySelectorAll('#sec-modal .option');
  const ok=i===d.a;
  opts[i].classList.add(ok?'correct':'wrong');
  if(!ok) opts[d.a].classList.add('reveal');
  const fb=document.getElementById('mfb');
  fb.textContent=ok?'✓ Bonne réponse !':'✗ Bonne réponse : "'+d.o[d.a]+'"';
  fb.className='fb '+(ok?'ok':'ko');
  score(ok);MS.res[MS.i]=ok;
  document.getElementById('mnav').innerHTML=`<button class="btn btn-primary" onclick="MS.i++;renderModal()">${MS.i+1<MODALD.length?'Suivante →':'Résultat →'}</button>`;
}

buildQCM();buildConj();buildLac();buildAsso();buildDates();buildNombres();buildTrad();buildDiag();buildVoc();buildModal();
