<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf9f6; --bg2: #f0ede6; --bg3: #e8e4db;
  --text: #1c1a14; --text2: #6b6860; --text3: #9a9890;

  --blue-bg: #fef9e7; --blue-tx: #c0392b;
  --radius: 14px; --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #16140f; --bg2: #201e17; --bg3: #2a2720;
    --text: #f0ece2; --text2: #a8a49a; --text3: #706e66;

    --red-bg: #2a0808; --red-bd: #5a0e0e; --red-tx: #e88888;
    --blue-bg: #2a1a08; --blue-tx: #f1c40f;
  }
}
html { height: 100%; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg3); color: var(--text);
  min-height: 100%; overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--accent);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex; align-items: center; gap: 10px;
}
.top-bar .logo-sm {
  background: var(--gold); color: #111;

}
.top-bar h1 { color: #fff; font-size: 15px; font-weight: 600; flex: 1; }
.score-pill {
  background: rgba(255,255,255,0.18); color: #fff;
  font-size: 13px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.prog-bar { height: 3px; background: rgba(255,255,255,0.2); }
.prog-fill { height: 100%; background: var(--gold); transition: width 0.4s ease; width: 0%; }
.tabs-wrap {
  overflow-x: auto; padding: 12px 14px 4px;
  -webkit-overflow-scrolling: touch;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 7px; min-width: max-content; }
.tab {
  padding: 8px 16px; border-radius: 20px;
  border: 1.5px solid var(--border2); font-size: 13px;
  cursor: pointer; background: var(--bg); color: var(--text2);
  font-weight: 500; white-space: nowrap;
  -webkit-user-select: none; transition: all 0.15s;
}
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.content { padding: 12px 14px calc(var(--safe-bot) + 80px); }
.section { display: none; }
.section.active { display: block; }
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 12px;
}
.card-tag {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--text3); text-transform: uppercase; margin-bottom: 8px; display: block;
}
.question { font-size: 15px; line-height: 1.6; margin-bottom: 14px; }
.question em { font-style: italic; color: var(--text2); }
.dots { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }
.dot.ok { background: var(--green-bd); }
.dot.ko { background: var(--red-bd); }
.dot.cur { background: var(--accent); }
.options { display: flex; flex-direction: column; gap: 9px; }
.option {
  padding: 13px 15px; border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 15px;
  color: var(--text); background: transparent;
  text-align: left; line-height: 1.4; cursor: pointer;
  -webkit-user-select: none; transition: background 0.1s;
  font-family: inherit;
}
.option:active:not(.locked) { background: var(--bg2); }
.option.correct { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); }
.option.wrong { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
.option.reveal { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); }
.fb {
  margin-top: 10px; padding: 11px 14px;
  border-radius: var(--radius-sm); font-size: 14px;
  display: none; line-height: 1.5;
}
.fb.ok { background: var(--green-bg); color: var(--green-tx); display: block; border-left: 3px solid var(--green-bd); }
.fb.ko { background: var(--red-bg); color: var(--red-tx); display: block; border-left: 3px solid var(--red-bd); }
.btn {
  padding: 11px 20px; border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 14px;
  cursor: pointer; background: transparent; color: var(--text);
  font-family: inherit; font-weight: 500; -webkit-user-select: none;
}
.btn:active { opacity: 0.75; }
.btn:disabled { opacity: 0.35; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.nav { display: flex; justify-content: flex-end; margin-top: 12px; }
.fill-in {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
  font-size: 15px; font-family: inherit; color: var(--text);
  background: var(--bg2); margin-bottom: 10px; outline: none;
  -webkit-appearance: none; appearance: none;
}
.fill-in:focus { border-color: var(--accent); }
.hint {
  font-size: 12px; color: var(--text3);
  padding: 6px 10px; background: var(--bg2);
  border-radius: 8px; display: inline-block; margin-bottom: 10px;
}
.match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.m-item {
  padding: 12px 10px; border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); font-size: 13px;
  text-align: center; color: var(--text); background: transparent;
  cursor: pointer; font-family: inherit; line-height: 1.4;

.m-item:active { background: var(--bg2); }

.m-item.m-ok { background: var(--green-bg); border-color: var(--green-bd); color: var(--green-tx); pointer-events: none; }
.m-item.m-ko { background: var(--red-bg); border-color: var(--red-bd); color: var(--red-tx); }
.bank { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.chip {
  padding: 8px 16px; border: 1.5px solid var(--border2);
  border-radius: 20px; font-size: 14px;
  color: var(--text); background: transparent;
  cursor: pointer; font-family: inherit; -webkit-user-select: none;

.chip:active:not(.used) { background: var(--bg2); }
.chip.sel-chip { border-color: var(--accent); background: var(--blue-bg); color: var(--blue-tx); }
.chip.used { opacity: 0.28; pointer-events: none; }
.diag-line { margin: 10px 0; font-size: 15px; line-height: 1.65; }
.diag-line strong { color: var(--accent); font-weight: 700; }
.blank {

.info-box {

textarea.fill-in { resize: none; min-height: 72px; }
</style>
</head>

<script>
'use strict';
let totOk=0,totAns=0;
function score(ok){
  totAns++;if(ok)totOk++;
  document.getElementById('sv').textContent=totOk+' / '+totAns;
  const p=totAns?Math.round(totOk/totAns*100):0;
  document.getElementById('sf').style.width=p+'%';
}
function showSec(id,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  el.classList.add('active');
  window.scrollTo(0,0);
}
function dots(data,cur,res){
  return data.map((_,i)=>{
    let c='dot';
    if(i<cur)c+=res[i]?' ok':' ko';
    else if(i===cur)c+=' cur';
    return '<div class="'+c+'"></div>';
  }).join('');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let QS={i:0,res:[]};
function buildQCM(){QS={i:0,res:[]};renderQ();}
function renderQ(){
  const el=document.getElementById('sec-qcm');
  if(QS.i>=QD.length){
    const ok=QS.res.filter(r=>r).length;
    el.innerHTML=`<div class="card congrats"><div class="emoji">${ok>=QD.length*.8?'🏆':'📚'}</div><h2>${ok} / ${QD.length}</h2><p>${ok>=QD.length*.8?'¡Excelente!':'¡Sigue practicando!'}</p><button class="btn btn-primary" onclick="buildQCM()">🔄 Recommencer</button></div>`;return;
  }
  const d=QD[QS.i];
  el.innerHTML=`<div class="dots">${dots(QD,QS.i,QS.res)}</div>
  <div class="card">
    <div class="card-tag">${esc(d.t)} · ${QS.i+1} / ${QD.length}</div>
    <div class="question">${esc(d.q)}</div>
    <div class="options">${d.o.map((o,i)=>`<button class="option" onclick="ansQ(${i})">${esc(o)}</button>`).join('')}</div>
    <div class="fb" id="qfb"></div>
    <div class="nav" id="qnav"></div>
  </div>`;
}
function ansQ(i){
  const d=QD[QS.i];
  document.querySelectorAll('#sec-qcm .option').forEach(b=>{b.onclick=null;b.classList.add('locked');});
  const opts=document.querySelectorAll('#sec-qcm .option');
  const ok=i===d.a;
  opts[i].classList.add(ok?'correct':'wrong');
  if(!ok)opts[d.a].classList.add('reveal');
  const fb=document.getElementById('qfb');
  fb.textContent=ok?'✓ ¡Correcto!':'✗ Réponse : "'+d.o[d.a]+'"';
  fb.className='fb '+(ok?'ok':'ko');
  score(ok);QS.res[QS.i]=ok;
  document.getElementById('qnav').innerHTML=`<button class="btn btn-primary" onclick="QS.i++;renderQ()">${QS.i+1<QD.length?'Suivante →':'Résultat →'}</button>`;
}

let AS={i:0,selL:null,selR:null,matched:[],res:[]};
function buildAsso(){AS={i:0,selL:null,selR:null,matched:[],res:[]};renderA();}
function renderA(){
  const el=document.getElementById('sec-asso');
  if(AS.i>=AD.length){el.innerHTML=`<div class="card congrats"><div class="emoji">🏆</div><h2>¡Terminado!</h2><p>Tous les groupes complétés.</p><button class="btn btn-primary" onclick="buildAsso()">🔄 Recommencer</button></div>`;return;}
  const d=AD[AS.i];
  const sr=[...d.p.map(p=>p[1])].sort(()=>Math.random()-.5);
  el.innerHTML=`<div class="card">
    <div class="card-tag">${esc(d.t)} · ${AS.i+1} / ${AD.length}</div>
    <div class="question">Relie chaque mot à sa traduction.</div>
    <div class="match-cols" id="ml">${d.p.map((p,i)=>`<button class="m-item" id="ml${i}" onclick="selM('l',${i},'${p[0].replace(/'/g,"\\'")}')">${esc(p[0])}</button>`).join('')}</div>
    <div style="height:10px"></div>
    <div class="match-cols" id="mr">${sr.map((r,i)=>`<button class="m-item" id="mr${i}" onclick="selM('r',${i},'${r.replace(/'/g,"\\'")}')">${esc(r)}</button>`).join('')}</div>
    <div class="fb" id="afb"></div>
  </div>`;
  AS.matched=[];AS.selL=null;AS.selR=null;
}
function selM(side,idx,val){
  if(side==='l'){document.querySelectorAll('#ml .m-item').forEach(b=>b.classList.remove('sel'));document.getElementById('ml'+idx).classList.add('sel');AS.selL={idx,val};}
  else{document.querySelectorAll('#mr .m-item').forEach(b=>b.classList.remove('sel'));document.getElementById('mr'+idx).classList.add('sel');AS.selR={idx,val};}
  if(AS.selL&&AS.selR){
    const d=AD[AS.i];
    const pair=d.p.find(p=>p[0]===AS.selL.val);
    const ok=pair&&pair[1]===AS.selR.val;
    const lel=document.querySelector('#ml .sel');
    const rel=document.querySelector('#mr .sel');
    if(ok){
      if(lel)lel.classList.replace('sel','m-ok');
      if(rel)rel.classList.replace('sel','m-ok');
      AS.matched.push(AS.selL.val);score(true);
      if(AS.matched.length===d.p.length){setTimeout(()=>{AS.i++;renderA();},600);}
    } else {
      if(lel){lel.classList.add('m-ko');setTimeout(()=>lel.classList.remove('sel','m-ko'),500);}
      if(rel){rel.classList.add('m-ko');setTimeout(()=>rel.classList.remove('sel','m-ko'),500);}
      score(false);
    }
    AS.selL=null;AS.selR=null;
  }
}

function renderDiag(){
  const el=document.getElementById('sec-diag');
  if(DIAGS.i>=DD.length){el.innerHTML=`<div class="card congrats"><div class="emoji">🏆</div><h2>¡Diálogos terminados!</h2><p>¡Muy bien!</p><button class="btn btn-primary" onclick="buildDiag()">🔄 Recommencer</button></div>`;return;}
  const d=DD[DIAGS.i];
  const chips=d.bank.map((w,wi)=>`<button class="chip" id="ch${wi}" onclick="pickChip('${w.replace(/'/g,"\\'")}',${wi})">${esc(w)}</button>`).join('');
  const lines=d.lines.map((l,li)=>{
    if(!l.key)return`<div class="diag-line"><strong>${esc(l.sp)} :</strong> ${esc(l.txt)}</div>`;
    return`<div class="diag-line"><strong>${esc(l.sp)} :</strong> ${l.txt.replace('___',`<span class="blank" id="bl${li}" onclick="fillBlank(${li})">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>`)}</div>`;
  }).join('');
  el.innerHTML=`<div class="card">
    <div class="card-tag">${esc(d.t)} · Diálogo ${DIAGS.i+1} / ${DD.length}</div>
    <div class="question">👆 Sélectionne un mot puis tape sur un blanc.</div>
    <div class="bank">${chips}</div>
    <div>${lines}</div>
    <div style="margin-top:14px"><button class="btn" id="dbtn" onclick="checkDiag()">Vérifier</button></div>
    <div class="fb" id="diafb"></div>
    <div class="nav" id="dianav"></div>
  </div>`;
  DIAGS.sel=null;DIAGS.filled={};
}
function pickChip(word,wi){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel-chip'));
  document.getElementById('ch'+wi).classList.add('sel-chip');
  DIAGS.sel={word,wi};
}
function fillBlank(li){
  if(!DIAGS.sel)return;
  const b=document.getElementById('bl'+li);
  if(DIAGS.filled[li]){
    const old=document.getElementById('ch'+DIAGS.filled[li].wi);
    if(old)old.classList.remove('used');
  }
  DIAGS.filled[li]=DIAGS.sel;
  b.textContent=DIAGS.sel.word;
  document.getElementById('ch'+DIAGS.sel.wi).classList.add('used');
  document.getElementById('ch'+DIAGS.sel.wi).classList.remove('sel-chip');
  DIAGS.sel=null;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel-chip'));
}
function checkDiag(){
  const d=DD[DIAGS.i];let ok=0,tot=0;
  d.lines.forEach((l,li)=>{
    if(!l.key)return;tot++;
    const b=document.getElementById('bl'+li);
    if(DIAGS.filled[li]&&DIAGS.filled[li].word.toLowerCase()===l.key.toLowerCase()){b.classList.add('b-ok');ok++;}
    else{b.classList.add('b-ko');b.textContent=l.key;}
  });
  const allOk=ok===tot;
  score(allOk);DIAGS.res[DIAGS.i]=allOk;
  const fb=document.getElementById('diafb');
  fb.textContent=allOk?'✓ ¡Perfecto!':'✗ '+ok+'/'+tot+' — Corrections en vert.';
  fb.className='fb '+(allOk?'ok':'ko');
  document.getElementById('dbtn').disabled=true;
  document.getElementById('dianav').innerHTML=`<button class="btn btn-primary" onclick="DIAGS.i++;renderDiag()">${DIAGS.i+1<DD.length?'Dialogue suivant →':'Résultat →'}</button>`;
}

/* INIT */
buildQCM();buildConj();buildLac();buildAsso();buildVoc();buildTrad();buildDiag();
</script>
